version: 0.2

phases:

  install:
    runtime-versions:
      python: 3.11

    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Checking Python syntax..."
      - python -m py_compile lambda_function.py
      - python -m py_compile fetch_data.py

artifacts:
  files:
    - '**/*'